name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要完整 commit 历史以正确生成 versionCode

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Sync bundled resources
        env:
          PIXEL_TEXT_HUB_BASE_URL: ${{ vars.PIXEL_TEXT_HUB_BASE_URL || 'https://pixeltext.api.mystery0.vip' }}
        shell: bash
        run: |
          set -euo pipefail

          BASE_URL="${PIXEL_TEXT_HUB_BASE_URL%/}"
          MANIFEST_URL="${BASE_URL}/api/v1/resources/manifest"
          ASSETS_DIR="app/src/main/assets"
          MANIFEST_FILE="$(mktemp)"

          fail() {
            echo "resource sync failed: $1" >&2
            exit 1
          }

          resolve_url() {
            local url="$1"
            if [[ "$url" == http://* || "$url" == https://* ]]; then
              echo "$url"
            else
              echo "${BASE_URL}/${url#/}"
            fi
          }

          download_artifact() {
            local name="$1"
            local url="$2"
            local target="$3"
            local expected_sha256="$4"
            local expected_size="$5"
            local artifact_url
            local actual_size
            local actual_sha256
            local normalized_expected_sha256

            artifact_url="$(resolve_url "$url")"
            echo "downloading ${name} url=${artifact_url}"
            mkdir -p "$(dirname "$target")"
            curl -fsSL --retry 3 --connect-timeout 30 --max-time 120 "$artifact_url" -o "$target"

            actual_size="$(wc -c < "$target" | tr -d '[:space:]')"
            if [[ "$actual_size" != "$expected_size" ]]; then
              fail "${name} size mismatch expected=${expected_size} actual=${actual_size}"
            fi

            actual_sha256="$(sha256sum "$target" | awk '{print $1}')"
            normalized_expected_sha256="$(echo "$expected_sha256" | tr '[:upper:]' '[:lower:]')"
            if [[ "$actual_sha256" != "$normalized_expected_sha256" ]]; then
              fail "${name} sha256 mismatch expected=${expected_sha256} actual=${actual_sha256}"
            fi

            echo "synced ${name} path=${target} size=${actual_size} sha256=${actual_sha256}"
          }

          trap 'rm -f "$MANIFEST_FILE"' EXIT

          echo "fetching resource manifest url=${MANIFEST_URL}"
          curl -fsSL --retry 3 --connect-timeout 30 --max-time 60 \
            -H "Accept: application/json" \
            "$MANIFEST_URL" \
            -o "$MANIFEST_FILE"

          RULES_VERSION="$(jq -er '.rules.version' "$MANIFEST_FILE")" || fail "rules artifact missing"
          RULES_URL="$(jq -er '.rules.downloadUrl' "$MANIFEST_FILE")" || fail "rules download url missing"
          RULES_SHA256="$(jq -er '.rules.sha256' "$MANIFEST_FILE")" || fail "rules sha256 missing"
          RULES_SIZE="$(jq -er '.rules.sizeBytes' "$MANIFEST_FILE")" || fail "rules size missing"

          SPAM_MODEL_VERSION="$(jq -er '.spamModel.version' "$MANIFEST_FILE")" || fail "spam model artifact missing"
          MODEL_URL="$(jq -er '.spamModel.model.downloadUrl' "$MANIFEST_FILE")" || fail "spam model download url missing"
          MODEL_SHA256="$(jq -er '.spamModel.model.sha256' "$MANIFEST_FILE")" || fail "spam model sha256 missing"
          MODEL_SIZE="$(jq -er '.spamModel.model.sizeBytes' "$MANIFEST_FILE")" || fail "spam model size missing"
          VOCAB_URL="$(jq -er '.spamModel.vocab.downloadUrl' "$MANIFEST_FILE")" || fail "vocab download url missing"
          VOCAB_SHA256="$(jq -er '.spamModel.vocab.sha256' "$MANIFEST_FILE")" || fail "vocab sha256 missing"
          VOCAB_SIZE="$(jq -er '.spamModel.vocab.sizeBytes' "$MANIFEST_FILE")" || fail "vocab size missing"

          download_artifact "rules" "$RULES_URL" "${ASSETS_DIR}/rules.json" "$RULES_SHA256" "$RULES_SIZE"
          download_artifact "spam model" "$MODEL_URL" "${ASSETS_DIR}/spam_classifier.tflite" "$MODEL_SHA256" "$MODEL_SIZE"
          download_artifact "vocab" "$VOCAB_URL" "${ASSETS_DIR}/vocab.txt" "$VOCAB_SHA256" "$VOCAB_SIZE"
          jq -n \
            --arg rulesVersion "$RULES_VERSION" \
            --arg spamModelVersion "$SPAM_MODEL_VERSION" \
            '{rulesVersion: $rulesVersion, spamModelVersion: $spamModelVersion}' \
            > "${ASSETS_DIR}/bundled_resource_versions.json"

          echo "resource sync completed rules_version=${RULES_VERSION} spam_model_version=${SPAM_MODEL_VERSION}"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGN_KEY_STORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build Release Bundle
        env:
          SIGN_KEY_STORE_FILE: ${{ runner.temp }}/release.jks
          SIGN_KEY_STORE_PASSWORD: ${{ secrets.SIGN_KEY_STORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
        run: chmod a+x ./gradlew && ./gradlew bundleRelease

      - name: Download bundletool
        run: |
          BUNDLETOOL_VERSION=1.17.2
          curl -fsSL \
            "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar" \
            -o bundletool.jar

      - name: Extract Universal APK from AAB
        run: |
          mkdir -p apk-output
          java -jar bundletool.jar build-apks \
            --bundle=app/build/outputs/bundle/release/app-release.aab \
            --output=apk-output/app.apks \
            --mode=universal \
            --ks="$RUNNER_TEMP/release.jks" \
            --ks-pass=pass:${{ secrets.SIGN_KEY_STORE_PASSWORD }} \
            --ks-key-alias=${{ secrets.SIGN_KEY_ALIAS }} \
            --key-pass=pass:${{ secrets.SIGN_KEY_PASSWORD }}
          unzip apk-output/app.apks universal.apk -d apk-output/
          mv apk-output/universal.apk "apk-output/PixelText-${GITHUB_REF_NAME}.apk"
          cp app/build/outputs/bundle/release/app-release.aab \
             "apk-output/PixelText-${GITHUB_REF_NAME}.aab"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PixelText ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            apk-output/PixelText-${{ github.ref_name }}.apk
            apk-output/PixelText-${{ github.ref_name }}.aab

      - name: Cleanup Keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"
